{% extends 'base.html' %}

{% block title %}Vendor Dashboard{% endblock %}

{% block content %}
    <h1>Welcome, {{ user.email }}</h1>
    
    <h3>Recent Transactions</h3>
    <table>
        <tr>
            <th>Amount</th>
            <th>Date</th>
        </tr>
        {% for txn in transactions %}
        <tr>
            <td>{{ txn.amount }}</td>
            <td>{{ txn.date }}</td>
        </tr>
        {% endfor %}
    </table>
{% endblock %}
