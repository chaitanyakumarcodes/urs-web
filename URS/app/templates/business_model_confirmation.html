<!DOCTYPE html>
<html>
<head>
    <title>Confirm Registration - URS</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-lg shadow-lg">
            <div>
                <h2 class="text-center text-3xl font-bold text-gray-900">
                    Confirm Your Choice
                </h2>
                <p class="mt-4 text-center text-gray-600">
                    Now that you've reviewed our business model, would you like to proceed?
                </p>
            </div>

            <form class="mt-8 space-y-6" action="{{ url_for('confirm_registration') }}" method="POST">
                <div class="flex flex-col space-y-4">
                    <button type="submit" name="choice" value="accept"
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                        Yes, I want to proceed
                    </button>
                    
                    <button type="submit" name="choice" value="decline"
                            class="w-full flex justify-center py-3 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        No, I need more time to decide
                    </button>
                </div>
            </form>

            <div class="mt-6 text-center text-sm">
                <p class="text-gray-500">
                    By proceeding, you agree to our terms and conditions
                </p>
            </div>
        </div>
    </div>
</body>
</html>
